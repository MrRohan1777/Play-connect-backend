spring.application.name=PlayConnect
server.port=${PORT:8080}

# Comma-separated; override in env for prod (e.g. APP_CORS_ALLOWED_ORIGINS)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://play-connect.onrender.com,https://spiffy-meerkat-bc95dd.netlify.app}

# Max arena rows loaded from DB before radius filter (pagination applies after filter)
app.arena.fetch-limit=${APP_ARENA_FETCH_LIMIT:2000}

# When creating a game with arenaId + lat/lng, coords must be within this distance (km) of the arena
app.game.arena-location-tolerance-km=${APP_GAME_ARENA_LOCATION_TOLERANCE_KM:1.0}
